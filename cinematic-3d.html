<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Framing - Immersive 3D Experience</title>
    <link rel="stylesheet" href="css/cinematic-3d.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scroll-container"></div>
    
    <div class="viewport">
        <header class="header">
            <img src="assets/logo.png" alt="London Framing Logo">
        </header>

        <div class="camera">
            <div class="scene">
                <!-- Javascript will inject 3D frames here -->
            </div>
        </div>

        <div class="overlay-ui">
            <h1>THE<br>VOID<br>COLLECTION</h1>
            <p>An interactive exploration of space, depth, and uncompromising framing design.</p>
        </div>

        <div class="scroll-indicator">
            SCROLL TO EXPLORE<br>
            <span class="arrow">↓</span>
        </div>
    </div>

    <script src="js/scroll-3d.js"></script>
</body>
</html>
