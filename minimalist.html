<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Framing - Minimalist Aesthetic</title>
    <link rel="stylesheet" href="css/minimalist.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="logo">
            <img class="logo-img" src="assets/logo.png" alt="London Framing Logo">
        </div>
        <nav class="main-nav">
            <a href="#" class="active">Collections</a>
            <a href="#">Bespoke</a>
            <a href="#">Journal</a>
            <a href="#">About</a>
        </nav>
        <div class="header-actions">
            <a href="#" class="btn-outline">Get Started</a>
            <button class="search-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </header>

    <main class="hero-section">
        <h1 class="hero-title">Frame your<br>memories.</h1>
        <p class="hero-subtitle">Contemporary oak and white frames designed to let your art breathe. Discover minimalism at its finest.</p>
        <a href="#" class="explore-link">
            Shop Collection
            <svg class="arrow-right" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
    </main>

    <footer class="site-footer">
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Pinterest</a>
        </div>
        <div class="copyright">
            © 2024 London Framing.
        </div>
        <div class="legal-links">
            <a href="#">Terms & Privacy</a>
        </div>
    </footer>
</body>
</html>
