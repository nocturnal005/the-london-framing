<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Framing - Editorial Gallery</title>
    <link rel="stylesheet" href="css/editorial-gallery.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="logo">
            <img class="logo-img" src="assets/logo.png" alt="London Framing Logo">
        </div>
        <nav class="main-nav">
            <a href="#" class="active">Gallery</a>
            <a href="#">Exhibitions</a>
            <a href="#">Atelier</a>
        </nav>
        <div class="header-actions">
            <button class="search-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-tag">Volume IV — Autumn</div>
        <h1 class="hero-title">The Art of<br><i>Presentation.</i></h1>
        <a href="#" class="explore-link">View Portfolio</a>
    </main>

    <footer class="site-footer">
        <div class="social-links">
            <a href="#">Ig.</a>
            <a href="#">Pt.</a>
            <a href="#">Tw.</a>
        </div>
        <div class="copyright">
            EST. 2024
        </div>
        <div class="legal-links">
            <a href="#">London, UK</a>
        </div>
    </footer>

</html>
